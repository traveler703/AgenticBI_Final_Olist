services:
  mysql:
    image: mysql:8.0
    container_name: agenticbi-olist-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ADMIN_PASSWORD:-root}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command: --default-authentication-plugin=mysql_native_password --sql-mode=
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ADMIN_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
